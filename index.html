                            <h3 className="text-xl font-bold text-white">הגדרות שחקנים</h3>
                            <p className="text-sm text-slate-400 mt-1">שיוך לסוכנים, הגדרת עמלות חריגות ופירוט שולחנות.</p>
                        </div>
                        <div className="relative w-full md:w-80">
                            <input 
                                type="text" 
                                placeholder="חפש שחקן (שם או כינוי)..." 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full bg-slate-900/80 border border-slate-600 rounded-xl pl-4 pr-12 py-3 text-sm text-white outline-none focus:border-emerald-500 shadow-inner transition-colors"
                            />
                            <div className="absolute right-4 top-1/2 transform -translate-y-1/2 text-emerald-500">
                                <Icon name="search" size={18} />
                            </div>
                        </div>
                    </div>

                    {players.length === 0 ? (
                        <div className="p-12 text-center border-2 border-dashed border-slate-700 rounded-2xl bg-slate-800/20">
                            <div className="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center text-slate-500 mx-auto mb-4"><Icon name="users" size={32}/></div>
                            <h4 className="text-lg font-bold text-white mb-2">אין שחקנים במערכת</h4>
                            <p className="text-slate-400">יש לגשת ללשונית "ייבוא דוחות" ולהעלות קובץ אקסל כדי לאכלס את המערכת.</p>
                        </div>
                    ) : (
                    <div className="overflow-x-auto rounded-xl border border-slate-700/50 shadow-xl">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-800 text-slate-300 uppercase text-[11px] tracking-widest">
                                <tr>
                                    <th className="p-4 font-bold text-center border-b border-slate-700 w-12">פירוט</th>
                                    <th className="p-4 font-bold text-right border-b border-slate-700">שחקן</th>
                                    <th className="p-4 font-bold text-right border-b border-slate-700">סוכן משויך</th>
                                    <th className="p-4 font-bold text-center border-b border-slate-700">עמלה עקיפה (%)</th>
                                    <th className="p-4 font-bold text-right border-b border-slate-700">תוספת בונוס</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-700/50 bg-slate-900/30">
                                {players.map(player => {
                                    const record = records.find(r => r.cycleId === currentCycle && r.playerId === player.id) || { pnl: 0, bonus: 0, tables: [] };
                                    const finalPnl = record.pnl + (record.bonus || 0);

                                    return (
                                        <Fragment key={player.id}>
                                            <tr className={`transition-colors ${expandedRow === player.id ? 'bg-slate-800' : 'hover:bg-slate-800/50'}`}>
                                                <td className="p-4 text-center cursor-pointer text-slate-400 hover:text-emerald-400" onClick={() => toggleRow(player.id)}>
                                                    <div className={`p-1.5 rounded-md inline-flex ${expandedRow === player.id ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800'}`}>
                                                        {expandedRow === player.id ? <Icon name="chevronUp" size={16}/> : <Icon name="chevronDown" size={16}/>}
                                                    </div>
                                                </td>
                                                <td className="p-4 text-right cursor-pointer" onClick={() => toggleRow(player.id)}>
                                                    <div className="font-bold text-white text-base">{player.name}</div>
                                                    <div className="text-xs text-slate-500">מזהה: {player.id.substring(0,6)}...</div>
                                                </td>
                                                <td className="p-4 text-right">
                                                    <select 
                                                        value={player.agentId} 
                                                        onChange={(e) => updatePlayer(player.id, 'agentId', e.target.value)}
                                                        className={`bg-slate-900 border rounded-lg px-3 py-2 text-sm text-white font-medium outline-none cursor-pointer transition-colors
                                                            ${player.agentId === 'agent_default' ? 'border-red-500/50 text-red-400 bg-red-900/10' : 'border-slate-600 focus:border-emerald-500'}`}
                                                    >
                                                        {agents.map(a => <option key={a.id} value={a.id}>{a.name}</option>)}
                                                    </select>
                                                </td>
                                                <td className="p-4 text-center">
                                                    <div className="inline-flex items-center bg-slate-900 border border-slate-600 rounded-lg overflow-hidden focus-within:border-emerald-500 transition-colors">
                                                        <input 
                                                            type="number" 
                                                            placeholder="דיפולט"
                                                            value={player.customCommission !== null ? player.customCommission : ''}
                                                            onChange={(e) => updatePlayer(player.id, 'customCommission', e.target.value === '' ? null : Number(e.target.value))}
                                                            className={`bg-transparent px-3 py-2 text-sm text-center w-20 outline-none
                                                                ${player.customCommission !== null ? 'text-emerald-400 font-bold' : 'text-white'}`}
                                                        />
                                                        <span className="bg-slate-800 text-slate-400 px-3 py-2 font-bold">%</span>
                                                    </div>
                                                </td>
                                                <td className="p-4 text-right">
                                                    {bonusInput.playerId === player.id ? (
                                                        <div className="flex items-center justify-end gap-2 bg-slate-900 p-1.5 rounded-lg border border-slate-600">
                                                            <input 
                                                                type="number" 
                                                                value={bonusInput.amount} 
                                                                onChange={(e)=>setBonusInput({...bonusInput, amount: e.target.value})}
                                                                placeholder="סכום..."
                                                                className="bg-transparent text-sm w-20 text-white outline-none px-2 text-center"
                                                                autoFocus
                                                            />
                                                            <button onClick={() => handleAddBonus(player.id)} className="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-md text-xs font-bold transition-colors">שמור</button>
                                                            <button onClick={() => setBonusInput({playerId: null, amount:''})} className="text-slate-400 hover:text-white px-2 py-1.5 text-xs transition-colors">בטל</button>
                                                        </div>
                                                    ) : (
                                                        <button onClick={() => setBonusInput({playerId: player.id, amount: ''})} 
                                                                className={`text-sm flex items-center justify-end gap-2 w-full transition-colors font-medium px-3 py-2 rounded-lg
                                                                ${record.bonus > 0 ? 'bg-emerald-900/20 text-emerald-400 border border-emerald-500/20 hover:bg-emerald-900/40' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
                                                            <Icon name="gift" size={16}/> 
                                                            {record.bonus > 0 ? `עודכן: ${formatMoney(record.bonus)}` : 'הוסף בונוס'}
                                                        </button>
                                                    )}
                                                </td>
                                            </tr>
                                            {/* Drill-down View */}
                                            {expandedRow === player.id && (
                                                <tr className="bg-slate-900"><td colSpan="5" className="p-0 border-b border-slate-800">
                                                    <PlayerDetailsDrilldown player={player} record={record} finalPnl={finalPnl} showToast={showToast} />
                                                </td></tr>
                                            )}
                                        </Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                    )}
                </div>
            );
        };

        // --- THE ULTIMATE CSV/EXCEL PARSER ---
        const AdminImportView = ({ setRecords, setUsers, users, currentCycle, cyclesList, setCyclesList, records, showToast }) => {
            const [newCycleName, setNewCycleName] = useState('');
            const [isParsing, setIsParsing] = useState(false);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if(!file) return;

                setIsParsing(true);

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = new Uint8Array(event.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        
                        let newPlayersCount = 0;
                        let newRecordsCount = 0;
                        let newUsers = [...users];
                        let newRecordsList = [...records];

                        // Helper to strictly extract numbers (handles "(1,500)" as -1500)
                        const extractNum = (val) => {
                            if (val === undefined || val === null || val === '') return 0;
                            let str = String(val).trim();
                            if (str.startsWith('(') && str.endsWith(')')) str = '-' + str.slice(1, -1);
                            const cleaned = str.replace(/[^\d.-]/g, '');
                            const num = parseFloat(cleaned);
                            return isNaN(num) ? 0 : num;
                        };

                        // Process ONLY the "Member Statistics" sheet or all sheets if we don't know the name
                        workbook.SheetNames.forEach(sheetName => {
                            const worksheet = workbook.Sheets[sheetName];
                            const rows = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});
                            if (!rows || rows.length === 0) return;

                            let dataStartRow = -1;
                            let colMap = { nickname: -1, agent: -1, pnl: -1, fee: -1, hands: -1 };

                            // 1. Find where the real table starts by looking for "Nickname" or "ID"
                            for (let i = 0; i < Math.min(15, rows.length); i++) {
                                const rowStr = rows[i].map(c => String(c).toLowerCase().trim()).join('|');
                                if (rowStr.includes('nickname') || rowStr.includes('player')) {
                                    dataStartRow = i + 1; // Data starts below the main header
                                    
                                    // 2. Identify the exact columns based on the complex multi-row headers
                                    for (let col = 0; col < rows[i].length; col++) {
                                        const h1 = String(rows[i > 0 ? i - 1 : i][col] || '').toLowerCase(); // Main category (e.g. Player P&L)
                                        const h2 = String(rows[i][col] || '').toLowerCase();       // Current row (e.g. Total)
                                        const h3 = String(rows[i + 1] ? rows[i + 1][col] : '').toLowerCase(); // Sub category
                                        
                                        const combinedHeader = `${h1} ${h2} ${h3}`;

                                        if (combinedHeader.includes('nickname') || h2 === 'player') colMap.nickname = col;
                                        if (combinedHeader.includes('agent')) colMap.agent = col;
                                        
                                        // The magical formulas to find the correct "Total" columns for GG Reports
                                        if (combinedHeader.includes('p&l') && combinedHeader.includes('total') && !combinedHeader.includes('insurance')) {
                                            colMap.pnl = col;
                                        }
                                        if ((combinedHeader.includes('fee') || combinedHeader.includes('rake')) && combinedHeader.includes('total')) {
                                            colMap.fee = col;
                                        }
                                        if (combinedHeader.includes('hands') && combinedHeader.includes('total')) {
                                            colMap.hands = col;
                                        }
                                    }
                                    break; // Stop looking for headers
                                }
                            }

                            if (dataStartRow === -1 || colMap.nickname === -1) return; // Skip sheet if not valid

                            // Fallback for simple flat CSVs
                            if (colMap.pnl === -1) colMap.pnl = rows[dataStartRow-1].findIndex(c => String(c).toLowerCase().includes('p&l'));
                            if (colMap.fee === -1) colMap.fee = rows[dataStartRow-1].findIndex(c => String(c).toLowerCase().includes('fee') || String(c).toLowerCase().includes('rake'));

                            // 3. Process the actual data rows
                            for (let idx = dataStartRow; idx < rows.length; idx++) {
                                const row = rows[idx];
                                if (!row || row.length <= colMap.nickname) continue;
                                
                                const nicknameRaw = row[colMap.nickname];
                                if (!nicknameRaw) continue;
                                
                                const nickname = String(nicknameRaw).trim();
                                if (!nickname || nickname === '-' || nickname.toLowerCase().includes('total')) continue;

                                // Extract the values
                                const pnl = colMap.pnl !== -1 ? extractNum(row[colMap.pnl]) : 0;
                                const rake = colMap.fee !== -1 ? extractNum(row[colMap.fee]) : 0;
                                const hands = colMap.hands !== -1 ? Math.round(extractNum(row[colMap.hands])) : 0;
                                
                                // Auto-Assign Agent Logic
                                let assignedAgentId = 'agent_default';
                                if (colMap.agent !== -1 && row[colMap.agent]) {
                                    const rawAgent = String(row[colMap.agent]).toLowerCase().trim();
                                    const matchedAgent = newUsers.find(u => u.role === 'agent' && u.name.toLowerCase() === rawAgent);
                                    if (matchedAgent) assignedAgentId = matchedAgent.id;
                                }

                                if (pnl === 0 && rake === 0 && hands === 0) continue;

                                // Create User if not exists
                                let player = newUsers.find(u => u.username === nickname);
                                if (!player) {
                                    player = {
                                        id: 'p_' + Date.now() + Math.random().toString(36).substr(2, 9),
                                        username: nickname,
                                        password: '123',
                                        role: 'player',
                                        name: nickname,
                                        agentId: assignedAgentId, // Auto assigned!
                                        customCommission: null
                                    };
                                    newUsers.push(player);
                                    newPlayersCount++;
                                } else if (player.agentId === 'agent_default' && assignedAgentId !== 'agent_default') {
                                    // Update existing unassigned player to their agent if found in new report
                                    player.agentId = assignedAgentId;
                                }

                                // Update or create record
                                const existingRecordIndex = newRecordsList.findIndex(r => r.cycleId === currentCycle && r.playerId === player.id);
                                if (existingRecordIndex >= 0) {
                                    newRecordsList[existingRecordIndex].pnl += pnl;
                                    newRecordsList[existingRecordIndex].rake += rake;
                                    newRecordsList[existingRecordIndex].hands += hands;
                                } else {
                                    newRecordsList.push({
                                        id: Date.now() + Math.random(),
                                        cycleId: currentCycle,
                                        playerId: player.id,
                                        pnl: pnl,
                                        rake: rake,
                                        hands: hands,
                                        bonus: 0,
                                        tables: [{ name: sheetName === 'Member Statistics' ? 'סיכום משחקים כללי' : sheetName, hands: hands, pnl: pnl, rake: rake }]
                                    });
                                    newRecordsCount++;
                                }
                            }
                        }); // End sheet loop

                        setUsers(newUsers);
                        setRecords(newRecordsList);
                        setIsParsing(false);
                        
                        showToast(`מעולה! ${newPlayersCount} שחקנים חדשים נוספו וקושרו. נתוני התחשבנות עודכנו בהצלחה.`);
                        e.target.value = '';
                    } catch (err) {
                        console.error("Parsing Error:", err);
                        setIsParsing(false);
                        showToast('שגיאה. ודא שזהו קובץ אקסל או CSV תקין.', 'error');
                        e.target.value = '';
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            const addCycle = () => {
                if(newCycleName && !cyclesList.includes(newCycleName)) {
                    setCyclesList([newCycleName, ...cyclesList]);
                    setNewCycleName('');
                    showToast('מחזור חדש נוצר לרשימה!');
                }
            };

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div className="flex flex-col items-center justify-center p-10 text-center border-2 border-dashed border-slate-700 hover:border-emerald-500/50 rounded-2xl bg-slate-900/40 transition-colors shadow-inner relative overflow-hidden group">
                        <div className="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-cyan-500/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div className={`w-20 h-20 rounded-full flex items-center justify-center mb-6 shadow-2xl border-2 relative z-10 
                            ${isParsing ? 'bg-emerald-900/50 border-emerald-500 animate-pulse text-emerald-300' : 'bg-slate-800 border-slate-600 text-emerald-400'}`}>
                            <Icon name="upload" size={40} />
                        </div>
                        <h3 className="text-2xl font-black mb-3 text-white relative z-10">{isParsing ? 'הקסם קורה עכשיו...' : 'ייבוא Member Statistics (Excel)'}</h3>
                        <p className="text-slate-400 text-sm mb-8 max-w-sm relative z-10 leading-relaxed">
                            העלה את דוח ה-Excel שהורדת מהמערכת או מגוגל שיטס. המערכת תסרוק אוטומטית שחקנים, סוכנים (כמו dop dop), עמלות ותוצאות.
                        </p>
                        <label className={`cursor-pointer text-white px-8 py-4 rounded-xl font-bold shadow-lg transition-all relative z-10 border 
                            ${isParsing ? 'bg-slate-700 border-slate-600 opacity-50 cursor-not-allowed' : 'bg-gradient-to-r from-emerald-600 to-cyan-600 hover:from-emerald-500 hover:to-cyan-500 border-transparent hover:-translate-y-1'}`}>
                            בחר קובץ Excel / CSV
                            <input type="file" className="hidden" accept=".csv, text/csv, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, .xlsx" onChange={handleFileUpload} disabled={isParsing} />
                        </label>
                    </div>

                    <div className="bg-slate-900/60 p-8 rounded-2xl border border-slate-700/80 flex flex-col justify-center shadow-xl">
                        <div className="flex items-center gap-3 mb-6">
                            <div className="w-10 h-10 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-600 text-cyan-400"><Icon name="dashboard" size={20}/></div>
                            <h3 className="text-xl font-bold text-white">ניהול מחזורים</h3>
                        </div>
                        <p className="text-slate-400 text-sm mb-6 leading-relaxed">
                            הנתונים שתייבא כעת ישויכו למחזור: <strong className="text-emerald-400 bg-emerald-900/20 px-2 py-1 rounded border border-emerald-500/20">{currentCycle}</strong>.<br/><br/>
                            אם התחיל שבוע חדש (יום שלישי 06:00), צור מחזור חדש לפני העלאת הדוח.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-3">
                            <input 
                                type="text" 
                                value={newCycleName}
                                onChange={(e)=>setNewCycleName(e.target.value)}
                                placeholder="שם מחזור (לדוג': 26/05 - 02/06)" 
                                className="flex-1 bg-slate-800 border border-slate-600 rounded-xl px-4 py-3 text-white outline-none focus:border-emerald-500 shadow-inner"
                            />
                            <button onClick={addCycle} className="bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-xl font-bold transition-colors whitespace-nowrap shadow-md">
                                צור מחזור
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const AdminMessagesView = ({ users, messages, setMessages, showToast }) => {
            const [text, setText] = useState('');
            const [imgUrl, setImgUrl] = useState('');
            const [targetId, setTargetId] = useState('all');

            const sendMsg = () => {
                if(!text) return;
                const newMsg = { id: Date.now(), senderId: 'admin1', receiverId: targetId, text, image: imgUrl, date: new Date().toLocaleDateString('he-IL') };
                setMessages([newMsg, ...messages]);
                setText(''); setImgUrl('');
                showToast('ההודעה נשלחה לנמענים!');
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div className="space-y-5 bg-slate-900/50 p-6 rounded-2xl border border-slate-700/50">
                        <h3 className="text-xl font-bold text-white mb-2 flex items-center gap-3"><Icon name="message" size={24} className="text-emerald-400"/> שליחת הודעת מערכת</h3>
                        <div>
                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">נמען</label>
                            <select value={targetId} onChange={(e)=>setTargetId(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl p-3.5 text-white outline-none focus:border-emerald-500 shadow-inner font-medium">
                                <option value="all">שידור לכולם (גלובלי)</option>
                                <optgroup label="סוכנים">{users.filter(u=>u.role==='agent').map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</optgroup>
                                <optgroup label="שחקנים">{users.filter(u=>u.role==='player').map(u => <option key={u.id} value={u.id}>{u.name}</option>)}</optgroup>
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">תוכן ההודעה</label>
                            <textarea value={text} onChange={(e)=>setText(e.target.value)} rows="4" className="w-full bg-slate-800 border border-slate-600 rounded-xl p-4 text-white outline-none focus:border-emerald-500 shadow-inner resize-none" placeholder="הקלד את ההודעה שתקפוץ למשתמשים..."></textarea>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">תמונה מצורפת (אופציונלי)</label>
                            <input type="text" value={imgUrl} onChange={(e)=>setImgUrl(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl p-3.5 text-white outline-none focus:border-emerald-500 shadow-inner" placeholder="הדבק URL של תמונה (https://...)" />
                        </div>
                        <button onClick={sendMsg} className="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-transform active:scale-95 w-full mt-2">
                            שגר הודעה
                        </button>
                    </div>

                    <div className="bg-slate-900/80 rounded-2xl p-6 border border-slate-700/50 flex flex-col h-[600px] shadow-inner">
                        <h4 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 pb-3 border-b border-slate-700 flex items-center gap-2">
                            <Icon name="dashboard" size={16}/> היסטוריית שידורים
                        </h4>
                        <div className="space-y-4 overflow-y-auto flex-1 pr-2">
                            {messages.filter(m => m.senderId === 'admin1').map(m => (
                                <div key={m.id} className="bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-sm relative">
                                    <div className="flex justify-between items-start mb-3 border-b border-slate-700/50 pb-2">
                                        <span className="font-bold text-emerald-400 text-sm">נמען: {m.receiverId === 'all' ? 'כולם' : users.find(u=>u.id===m.receiverId)?.name || 'לא ידוע'}</span>
                                        <span className="text-[10px] text-slate-500 font-medium">{m.date}</span>
                                    </div>
                                    <p className="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap">{m.text}</p>
                                    {m.image && <img src={m.image} alt="Attachment" className="mt-3 rounded-lg border border-slate-600 max-h-40 object-cover shadow-md" />}
                                </div>
                            ))}
                            {messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center text-slate-500 opacity-50">
                                    <Icon name="message" size={48} className="mb-4" />
                                    <p>טרם נשלחו הודעות.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // AGENT DASHBOARD
        // ==========================================
        const AgentDashboard = ({ user, users, records, currentCycle, showToast }) => {
            const [sortBy, setSortBy] = useState('pnl');
            const [expandedRow, setExpandedRow] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');

            const myPlayers = users.filter(u => u.agentId === user.id);
            
            const playerStats = useMemo(() => {
                const filtered = searchQuery 
                    ? myPlayers.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.username.toLowerCase().includes(searchQuery.toLowerCase()))
                    : myPlayers;

                return filtered.map(player => {
                    const record = records.find(r => r.cycleId === currentCycle && r.playerId === player.id) || { pnl: 0, rake: 0, hands: 0, bonus: 0, tables: [] };
                    const rate = player.customCommission !== null ? player.customCommission : user.commissionRate;
                    
                    const generatedCommissionNet = record.rake * (1 - SYSTEM_EXPENSES_RATE); // 100% העמלה לחלוקה (נטו)
                    const agentCommission = generatedCommissionNet * (rate / 100);
                    
                    return { ...player, ...record, generatedCommissionNet, calculatedCommission: agentCommission, finalPnl: record.pnl + (record.bonus || 0) };
                }).sort((a, b) => {
                    if (sortBy === 'pnl') return a.pnl - b.pnl;
                    if (sortBy === 'commission') return b.calculatedCommission - a.calculatedCommission;
                    if (sortBy === 'hands') return b.hands - a.hands;
                    return 0;
                });
            }, [myPlayers, records, currentCycle, user.commissionRate, sortBy, searchQuery]);

            const totalHands = playerStats.reduce((sum, p) => sum + p.hands, 0);
            const totalPnl = playerStats.reduce((sum, p) => sum + p.finalPnl, 0);
            const totalNetCommission = playerStats.reduce((sum, p) => sum + p.generatedCommissionNet, 0);
            const totalAgentCommission = playerStats.reduce((sum, p) => sum + p.calculatedCommission, 0);
            
            const totalAgainstClub = totalPnl + totalAgentCommission;

            const toggleRow = (id) => setExpandedRow(expandedRow === id ? null : id);

            return (
                <div className="space-y-6">
                    <div className="card-gradient rounded-2xl p-4 sm:p-8 border border-slate-700/50 shadow-2xl">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
                            <div>
                                <h3 className="text-2xl font-black text-white">רשימת השחקנים שלי</h3>
                                <p className="text-slate-400 text-sm mt-1">לחץ על שחקן כדי לראות פירוט שולחנות וסיסמה.</p>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                                <div className="relative w-full sm:w-64">
                                    <input 
                                        type="text" 
                                        placeholder="חיפוש שחקן..." 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="w-full bg-slate-900/80 border border-slate-600 rounded-xl pl-4 pr-10 py-2.5 text-sm text-white outline-none focus:border-emerald-500 shadow-inner transition-colors"
                                    />
                                    <div className="absolute right-3 top-1/2 transform -translate-y-1/2 text-slate-500">
                                        <Icon name="search" size={18} />
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 bg-slate-900/80 border border-slate-600 rounded-xl px-4 py-2.5 w-full sm:w-auto shadow-inner">
                                    <Icon name="sort" size={18} className="text-slate-400"/>
                                    <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="bg-transparent text-sm font-medium text-white outline-none cursor-pointer w-full">
                                        <option value="pnl">מיון: תוצאה (P&L)</option>
                                        <option value="commission">מיון: עמלה</option>
                                        <option value="hands">מיון: ידיים</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div className="overflow-x-auto rounded-xl border border-slate-700/50 shadow-xl">
                            <table className="w-full text-left text-sm whitespace-nowrap">
                                <thead className="bg-slate-800 text-slate-300 uppercase text-[11px] tracking-widest">
                                    <tr>
                                        <th className="p-5 font-bold text-center border-b border-slate-700 w-12">פירוט</th>
                                        <th className="p-5 font-bold text-right border-b border-slate-700">כינוי השחקן</th>
                                        <th className="p-5 font-bold text-center border-b border-slate-700">סה"כ ידיים</th>
                                        <th className="p-5 font-bold text-right border-b border-slate-700">תוצאה (P&L)</th>
                                        <th className="p-5 font-bold text-right text-emerald-500 border-b border-slate-700">עמלה שייצר (נטו)</th>
                                        <th className="p-5 font-bold text-right text-emerald-400 border-b border-slate-700 bg-emerald-900/10">העמלה שלי</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700/50 bg-slate-900/30">
                                    {playerStats.map(stat => (
                                        <Fragment key={stat.id}>
                                            <tr className={`transition-colors cursor-pointer group ${expandedRow === stat.id ? 'bg-slate-800' : 'hover:bg-slate-800/50'}`} onClick={() => toggleRow(stat.id)}>
                                                <td className="p-5 text-center text-slate-500 group-hover:text-emerald-400">
                                                    <div className={`p-1.5 rounded-md inline-flex ${expandedRow === stat.id ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-800'}`}>
                                                        {expandedRow === stat.id ? <Icon name="chevronUp" size={16}/> : <Icon name="chevronDown" size={16}/>}
                                                    </div>
                                                </td>
                                                <td className="p-5 text-right">
                                                    <div className="font-bold text-white text-base">{stat.name}</div>
                                                    <div className="text-[10px] text-slate-500 mt-1 uppercase tracking-wider">{stat.username}</div>
                                                </td>
                                                <td className="p-5 text-center font-medium text-slate-300">{stat.hands.toLocaleString()}</td>
                                                <td className={`p-5 text-right font-bold text-base ${getColorClass(stat.finalPnl)}`}>{formatMoney(stat.finalPnl)}</td>
                                                <td className="p-5 text-right font-bold text-emerald-500/80">{formatMoney(stat.generatedCommissionNet)}</td>
                                                <td className="p-5 text-right font-black text-lg text-emerald-400 bg-emerald-900/5">{formatMoney(stat.calculatedCommission)}</td>
                                            </tr>
                                            {/* Drill-down View using the shared component */}
                                            {expandedRow === stat.id && (
                                                <tr className="bg-slate-900"><td colSpan="6" className="p-0 border-b border-slate-800">
                                                    <PlayerDetailsDrilldown player={stat} record={stat} finalPnl={stat.finalPnl} showToast={showToast} />
                                                </td></tr>
                                            )}
                                        </Fragment>
                                    ))}
                                </tbody>
                                <tfoot className="bg-slate-800/90 border-t-2 border-slate-600">
                                    <tr>
                                        <td colSpan="2" className="p-5 text-right font-black text-slate-300">סיכום סוכן (סה"כ):</td>
                                        <td className="p-5 text-center font-bold text-white">{totalHands.toLocaleString()}</td>
                                        <td className={`p-5 text-right font-bold text-lg ${getColorClass(totalPnl)}`}>{formatMoney(totalPnl)}</td>
                                        <td className="p-5 text-right font-bold text-emerald-500/80">{formatMoney(totalNetCommission)}</td>
                                        <td className="p-5 text-right font-black text-xl text-emerald-400 bg-emerald-900/20">{formatMoney(totalAgentCommission)}</td>
                                    </tr>
                                    <tr className="bg-slate-900 border-t border-slate-700">
                                        <td colSpan="4" className="p-6 text-right font-black text-slate-200 text-lg flex items-center gap-3">
                                            <div className="w-2 h-8 bg-cyan-500 rounded-full"></div>
                                            התחשבנות סופית מול מועדון (תוצאה + עמלה):
                                        </td>
                                        <td colSpan="2" className={`p-6 text-right text-3xl font-black tracking-tight ${getColorClass(totalAgainstClub)}`}>{formatMoney(totalAgainstClub)}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // PLAYER DASHBOARD (BANK VIP STYLE)
        // ==========================================
        const PlayerDashboard = ({ user, records, messages, currentCycle }) => {
            const cycleRecord = records.find(r => r.cycleId === currentCycle && r.playerId === user.id) || { pnl: 0, hands: 0, bonus: 0, tables: [] };
            const finalResult = (cycleRecord.pnl || 0) + (cycleRecord.bonus || 0);
            const myMessages = messages.filter(m => m.receiverId === 'all' || m.receiverId === user.id);

            const getRank = (hands) => {
                if(hands > 10000) return { name: 'Titanium', color: 'text-purple-400', bg: 'bg-purple-900/20', border: 'border-purple-500/30' };
                if(hands > 5000) return { name: 'Gold', color: 'text-yellow-400', bg: 'bg-yellow-900/20', border: 'border-yellow-500/30' };
                if(hands > 1000) return { name: 'Silver', color: 'text-slate-300', bg: 'bg-slate-700/50', border: 'border-slate-500/50' };
                return { name: 'Bronze', color: 'text-orange-400', bg: 'bg-orange-900/20', border: 'border-orange-500/30' };
            };
            const rank = getRank(cycleRecord.hands || 0);

            return (
                <div className="max-w-4xl mx-auto space-y-8 mt-4">
                    {/* The "Credit Card" */}
                    <div className="relative overflow-hidden rounded-3xl bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700 shadow-2xl p-8 sm:p-12 group">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/10 rounded-full blur-[80px] pointer-events-none transition-transform duration-700 group-hover:scale-110"></div>
                        <div className="absolute bottom-0 left-0 w-48 h-48 bg-cyan-500/10 rounded-full blur-[60px] pointer-events-none transition-transform duration-700 group-hover:scale-110"></div>
                        
                        <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
                            <div>
                                <h2 className="text-slate-400 text-xs font-bold tracking-[0.2em] uppercase mb-3 flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div> יתרת מחזור מעודכנת
                                </h2>
                                <div className={`text-6xl md:text-7xl font-black tracking-tight ${getColorClass(finalResult)} drop-shadow-lg`}>
                                    {formatMoney(finalResult)}
                                </div>
                                {cycleRecord.bonus > 0 && (
                                    <div className="mt-4 text-sm text-emerald-400 flex items-center gap-2 bg-emerald-900/40 inline-flex px-4 py-2 rounded-lg font-bold border border-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.15)]">
                                        <Icon name="gift" size={16}/> 
                                        בונוס מועדון מצורף: {formatMoney(cycleRecord.bonus)}
                                    </div>
                                )}
                            </div>
                            
                            <div className="bg-slate-900/80 backdrop-blur-md rounded-2xl p-6 border border-slate-700 w-full md:w-64 shadow-xl">
                                <div className="text-[10px] text-slate-400 uppercase tracking-widest mb-1">סטטוס משתמש</div>
                                <div className={`text-3xl font-black ${rank.color} tracking-wide mb-4`}>{rank.name} <span className="text-sm">VIP</span></div>
                                <div className="flex justify-between items-center border-t border-slate-700/50 pt-3">
                                    <span className="text-xs text-slate-500 uppercase font-bold tracking-widest">ידיים שוחקו</span>
                                    <span className="font-bold text-white text-lg">{cycleRecord.hands.toLocaleString()}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Table Details */}
                    {cycleRecord.tables && cycleRecord.tables.length > 0 && (
                        <div className="bg-slate-900/60 rounded-3xl p-6 md:p-8 border border-slate-800 shadow-xl relative overflow-hidden">
                            <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-3">
                                <Icon name="dashboard" size={24} className="text-emerald-400"/> פירוט שולחנות וטורנירים
                            </h3>
                            <div className="overflow-x-auto rounded-xl border border-slate-700/50">
                                <table className="w-full text-right text-sm">
                                    <thead className="bg-slate-800 text-slate-400 text-xs uppercase tracking-widest">
                                        <tr>
                                            <th className="p-4 font-bold border-b border-slate-700">שם שולחן / טורניר</th>
                                            <th className="p-4 font-bold text-center border-b border-slate-700">ידיים</th>
                                            <th className="p-4 font-bold border-b border-slate-700">תוצאה (P&L)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50 bg-slate-900/30">
                                        {cycleRecord.tables.map((t, idx) => (
                                            <tr key={idx} className="hover:bg-slate-800/60 transition-colors">
                                                <td className="p-4 font-medium text-slate-200 text-base">{t.name}</td>
                                                <td className="p-4 text-center text-slate-300 font-medium">{t.hands}</td>
                                                <td className={`p-4 font-bold text-lg ${getColorClass(t.pnl)}`}>{formatMoney(t.pnl)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot className="bg-slate-800/90 border-t-2 border-slate-600">
                                        <tr>
                                            <td className="p-5 font-black text-slate-300 text-base">סה"כ משחקים:</td>
                                            <td className="p-5 font-bold text-white text-center text-base">{cycleRecord.hands}</td>
                                            <td className={`p-5 font-black text-xl ${getColorClass(cycleRecord.pnl)}`}>{formatMoney(cycleRecord.pnl)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* Inbox */}
                    <div className="bg-slate-900/60 rounded-3xl p-6 md:p-8 border border-slate-800 shadow-xl">
                        <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-3">
                            <Icon name="message" size={24} className="text-cyan-400"/> 
                            הודעות ממועדון NETABEL
                        </h3>
                        {myMessages.length === 0 ? (
                            <div className="text-center py-16 text-slate-500 bg-slate-800/20 rounded-2xl border-2 border-dashed border-slate-700/50">
                                <Icon name="message" size={48} className="mx-auto mb-4 opacity-50"/>
                                <p className="font-medium text-lg">תיבת ההודעות שלך ריקה.</p>
                            </div>
                        ) : (
                            <div className="space-y-5">
                                {myMessages.map(msg => (
                                    <div key={msg.id} className="bg-slate-800/80 rounded-2xl p-6 border border-slate-700 shadow-md hover:border-cyan-500/30 transition-colors">
                                        <div className="flex justify-between items-center mb-4 border-b border-slate-700/50 pb-3">
                                            <div className="flex items-center gap-3">
                                                <div className="w-8 h-8 rounded-full bg-cyan-500/20 flex items-center justify-center border border-cyan-500/50 shadow-[0_0_10px_rgba(6,182,212,0.2)]">
                                                    <span className="text-cyan-400 text-sm font-black">N</span>
                                                </div>
                                                <span className="font-bold text-slate-100 text-base">הנהלת המועדון</span>
                                            </div>
                                            <span className="text-xs text-slate-500 font-bold tracking-widest bg-slate-900 px-3 py-1 rounded-full">{msg.date}</span>
                                        </div>
                                        <p className="text-slate-300 text-base leading-relaxed whitespace-pre-wrap">{msg.text}</p>
                                        {msg.image && (
                                            <div className="mt-5 rounded-xl overflow-hidden border border-slate-600 inline-block shadow-lg">
                                                <img src={msg.image} alt="Club" className="max-w-full h-auto max-h-64 object-cover" />
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
