<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מועדון NETABEL - מערכת ניהול והתחשבנות</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SheetJS for Excel/CSV Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Heebo', sans-serif; background-color: #0b1120; color: #f8fafc; overflow-x: hidden; }
        .glass-panel { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .card-gradient { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0b1120; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast-animate { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .modal-animate { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;

        const DEFAULT_CYCLE = "מחזור נוכחי";
        const SYSTEM_EXPENSES_RATE = 0.10; // 10% הוצאות למועדון

        const initialUsers = [
            { id: 'admin1', username: 'admin', password: 'X', role: 'admin', name: 'מנהל ראשי' },
            { id: 'agent_default', username: 'unassigned', password: '123', role: 'agent', name: 'שחקנים ללא סוכן', commissionRate: 0 },
            { id: 'agent_otc1', username: 'otc1', password: '123', role: 'agent', name: 'OTC 1', commissionRate: 70 },
            { id: 'agent_amirgu', username: 'amirgu', password: '123', role: 'agent', name: 'AMIRGU', commissionRate: 70 },
            { id: 'agent_naki', username: 'naki', password: '123', role: 'agent', name: 'NAKI', commissionRate: 70 },
            { id: 'agent_oz', username: 'oz', password: '123', role: 'agent', name: 'OZ', commissionRate: 70 },
            { id: 'agent_dopdop', username: 'dopdop', password: '123', role: 'agent', name: 'dop dop', commissionRate: 70 }, // הסוכן החדש
        ];

        // --- Utils ---
        const formatMoney = (amount) => {
            if (!amount && amount !== 0) return '₪0.00';
            const num = parseFloat(amount);
            // Handling negatives cleanly for display
            const isNegative = num < 0;
            const absoluteValue = Math.abs(num);
            const formatted = absoluteValue.toLocaleString('he-IL', { style: 'currency', currency: 'ILS' });
            return isNegative ? `-${formatted}` : formatted;
        };

        const getColorClass = (amount, forceGreen = false) => {
            if (forceGreen) return 'text-emerald-400';
            if (!amount || amount === 0) return 'text-slate-400';
            return amount > 0 ? 'text-emerald-400' : 'text-red-400';
        };

        // --- Icons (Inline SVGs) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                users: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
                dashboard: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>,
                message: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
                upload: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
                logout: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>,
                gift: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 12 20 22 4 22 4 12"></polyline><rect x="2" y="7" width="20" height="5"></rect><line x1="12" y1="22" x2="12" y2="7"></line><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path></svg>,
                chevronDown: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>,
                chevronUp: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"></polyline></svg>,
                sort: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="14" y2="12"></line><line x1="4" y1="18" x2="8" y2="18"></line></svg>,
                search: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
                settings: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
                trash: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
                eye: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
                check: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>,
                alert: <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
            };
            return icons[name] || null;
        };

        // --- Custom UI Components ---
        const Toast = ({ message, type }) => (
            <div className={`fixed bottom-8 left-1/2 transform -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.5)] flex items-center gap-3 toast-animate font-bold ${type === 'success' ? 'bg-emerald-500 text-white' : 'bg-red-500 text-white'}`}>
                <Icon name={type === 'success' ? 'check' : 'alert'} size={18} />
                {message}
            </div>
        );

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel, confirmText = "אישור", confirmColor = "bg-red-600 hover:bg-red-700" }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm modal-animate">
                    <div className="bg-slate-900 border border-slate-700 rounded-2xl p-6 max-w-md w-full shadow-2xl">
                        <h3 className="text-xl font-bold text-white mb-2">{title}</h3>
                        <p className="text-slate-300 mb-6 leading-relaxed">{message}</p>
                        <div className="flex justify-end gap-3">
                            <button onClick={onCancel} className="px-5 py-2 rounded-lg font-medium text-slate-300 bg-slate-800 hover:bg-slate-700 transition-colors">
                                ביטול
                            </button>
                            <button onClick={onConfirm} className={`px-5 py-2 rounded-lg font-bold text-white transition-colors shadow-lg ${confirmColor}`}>
                                {confirmText}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [currentUser, setCurrentUser] = useState(null);
            const [users, setUsers] = useState([]);
            const [records, setRecords] = useState([]);
            const [messages, setMessages] = useState([]);
            const [currentCycle, setCurrentCycle] = useState(DEFAULT_CYCLE);
            const [cyclesList, setCyclesList] = useState([DEFAULT_CYCLE]);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                const storedUsers = JSON.parse(localStorage.getItem('netabel_db_users'));
                const storedRecords = JSON.parse(localStorage.getItem('netabel_db_records'));
                const storedMessages = JSON.parse(localStorage.getItem('netabel_db_messages'));
                const storedCycles = JSON.parse(localStorage.getItem('netabel_db_cycles'));
                
                if (storedUsers) setUsers(storedUsers); else setUsers(initialUsers);
                if (storedRecords) setRecords(storedRecords); else setRecords([]);
                if (storedMessages) setMessages(storedMessages); else setMessages([]);
                if (storedCycles) setCyclesList(storedCycles); else setCyclesList([DEFAULT_CYCLE]);
            }, []);

            useEffect(() => {
                if(users.length > 0) {
                    localStorage.setItem('netabel_db_users', JSON.stringify(users));
                    localStorage.setItem('netabel_db_records', JSON.stringify(records));
                    localStorage.setItem('netabel_db_messages', JSON.stringify(messages));
                    localStorage.setItem('netabel_db_cycles', JSON.stringify(cyclesList));
                }
            }, [users, records, messages, cyclesList]);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3500);
            };

            const login = (username, password) => {
                const user = users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
                if (user) {
                    setCurrentUser(user);
                    showToast(`ברוך הבא למערכת, ${user.name || user.username}`);
                } else {
                    showToast('שם משתמש או סיסמה שגויים', 'error');
                }
            };

            if (!currentUser) {
                return (
                    <div className="relative">
                        <LoginScreen onLogin={login} />
                        {toast && <Toast message={toast.message} type={toast.type} />}
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col text-slate-100 bg-[#0b1120] relative overflow-x-hidden">
                    <TopNavBar user={currentUser} logout={() => setCurrentUser(null)} currentCycle={currentCycle} setCurrentCycle={setCurrentCycle} cyclesList={cyclesList} />
                    <GlobalStatsHeader user={currentUser} users={users} records={records.filter(r => r.cycleId === currentCycle)} />
                    
                    <main className="flex-1 w-full max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
                        {currentUser.role === 'admin' && (
                            <AdminDashboard 
                                users={users} setUsers={setUsers} records={records} setRecords={setRecords}
                                messages={messages} setMessages={setMessages} currentCycle={currentCycle} 
                                cyclesList={cyclesList} setCyclesList={setCyclesList} showToast={showToast}
                            />
                        )}
                        {currentUser.role === 'agent' && (
                            <AgentDashboard user={currentUser} users={users} records={records} currentCycle={currentCycle} showToast={showToast} />
                        )}
                        {currentUser.role === 'player' && (
                            <PlayerDashboard user={currentUser} records={records} messages={messages} currentCycle={currentCycle} />
                        )}
                    </main>
                    {toast && <Toast message={toast.message} type={toast.type} />}
                </div>
            );
        };

        const TopNavBar = ({ user, logout, currentCycle, setCurrentCycle, cyclesList }) => (
            <nav className="glass-panel sticky top-0 z-40">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
                    <div className="flex items-center gap-4">
                        <div className="flex-shrink-0 text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 flex items-center gap-2">
                            <div className="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center border border-emerald-500/50">
                                <span className="text-emerald-400 text-lg">♠</span>
                            </div>
                            NETABEL
                        </div>
                        <div className="ml-8 border-r border-slate-700 pr-4">
                            <select value={currentCycle} onChange={(e) => setCurrentCycle(e.target.value)} className="bg-slate-800 text-sm font-medium rounded border border-slate-600 px-3 py-1.5 text-white outline-none focus:border-emerald-500 cursor-pointer shadow-sm">
                                {cyclesList.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                    </div>
                    <div className="flex items-center gap-4">
                        <div className="text-right hidden sm:block leading-tight">
                            <div className="text-sm font-bold text-slate-200">{user.name || user.username}</div>
                            <div className="text-[10px] text-emerald-400 uppercase tracking-wider font-semibold">
                                {user.role === 'admin' ? 'מנהל מערכת' : user.role === 'agent' ? 'סוכן' : 'שחקן'}
                            </div>
                        </div>
                        <button onClick={logout} className="p-2 rounded-lg hover:bg-slate-800 text-slate-400 hover:text-white transition-colors" title="התנתק">
                            <Icon name="logout" size={20} />
                        </button>
                    </div>
                </div>
            </nav>
        );

        const GlobalStatsHeader = ({ user, users, records }) => {
            if (user.role === 'player') return null;

            const players = users.filter(u => u.role === 'player');
            const agents = users.filter(u => u.role === 'agent');

            let headerTitle = "סיכום מועדון (אדמין)";
            let displayPnL = 0;
            let displayCommission = 0;
            let activePlayers = 0;

            if (user.role === 'admin') {
                displayPnL = records.reduce((sum, r) => sum + (r.pnl || 0), 0);
                activePlayers = records.length;
                records.forEach(r => {
                    const player = players.find(p => p.id === r.playerId);
                    if (player) {
                        const agent = agents.find(a => a.id === player.agentId);
                        const rate = player.customCommission !== null ? player.customCommission : (agent?.commissionRate || 0);
                        const netRake = r.rake * (1 - SYSTEM_EXPENSES_RATE);
                        displayCommission += netRake * (rate / 100);
                    }
                });
            } else if (user.role === 'agent') {
                headerTitle = "הנתונים שלי (סוכן)";
                const myPlayers = players.filter(p => p.agentId === user.id).map(p => p.id);
                const myRecords = records.filter(r => myPlayers.includes(r.playerId));
                activePlayers = myRecords.length;
                
                myRecords.forEach(r => {
                    const player = players.find(p => p.id === r.playerId);
                    const rate = player.customCommission !== null ? player.customCommission : user.commissionRate;
                    
                    const playerPnl = r.pnl + (r.bonus || 0);
                    const netRake = r.rake * (1 - SYSTEM_EXPENSES_RATE);
                    const agentComm = netRake * (rate / 100);
                    
                    displayPnL += playerPnl;
                    displayCommission += agentComm;
                });
            }

            const totalAgainstClub = displayPnL + displayCommission;

            return (
                <div className="bg-slate-900 border-b border-slate-800 py-4 px-4 sm:px-6 lg:px-8 shadow-inner relative z-30">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div className="text-slate-400 text-sm font-medium tracking-wide flex items-center gap-2">
                            <Icon name="dashboard" size={16}/>
                            {headerTitle} <span className="text-slate-600">|</span> פעילים: <span className="text-white">{activePlayers}</span>
                        </div>
                        <div className="flex flex-wrap gap-4 sm:gap-8">
                            <div className="text-right bg-slate-800/50 px-4 py-2 rounded-lg border border-slate-700/50">
                                <div className="text-[10px] text-slate-500 uppercase tracking-widest mb-1">תוצאת שחקנים כללית</div>
                                <div className={`text-xl font-black ${getColorClass(displayPnL)}`}>{formatMoney(displayPnL)}</div>
                            </div>
                            <div className="text-right bg-slate-800/50 px-4 py-2 rounded-lg border border-slate-700/50">
                                <div className="text-[10px] text-slate-500 uppercase tracking-widest mb-1">{user.role === 'admin' ? "סה\"כ עמלות ששולמו" : "העמלה שלי (נטו)"}</div>
                                <div className="text-xl font-black text-emerald-400">{formatMoney(displayCommission)}</div>
                            </div>
                            {user.role === 'agent' && (
                                <div className="text-right bg-slate-800/80 px-5 py-2 rounded-lg border border-emerald-500/30 shadow-[0_0_15px_rgba(16,185,129,0.1)]">
                                    <div className="text-[10px] text-emerald-400 font-bold uppercase tracking-widest mb-1">התחשבנות סופית (מול המועדון)</div>
                                    <div className={`text-xl font-black ${getColorClass(totalAgainstClub)}`}>{formatMoney(totalAgainstClub)}</div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [user, setUser] = useState('');
            const [pass, setPass] = useState('');

            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden bg-[#0b1120]">
                    <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-emerald-500/10 rounded-full blur-[120px]"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-500/10 rounded-full blur-[120px]"></div>
                    
                    <div className="glass-panel p-10 rounded-3xl w-full max-w-md z-10 shadow-2xl border border-slate-700/50 card-gradient">
                        <div className="text-center mb-10">
                            <div className="w-20 h-20 rounded-full bg-slate-900 flex items-center justify-center border border-emerald-500/30 mx-auto mb-5 shadow-[0_0_30px_rgba(16,185,129,0.15)]">
                                <span className="text-emerald-400 text-4xl font-black">♠</span>
                            </div>
                            <h2 className="text-3xl font-black text-white tracking-tight">מועדון NETABEL</h2>
                            <p className="text-slate-400 text-sm mt-2 font-medium">מערכת בנקאות והתחשבנות</p>
                        </div>
                        <form onSubmit={(e) => { e.preventDefault(); onLogin(user, pass); }} className="space-y-6">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">שם משתמש</label>
                                <input type="text" value={user} onChange={(e) => setUser(e.target.value)} required 
                                       className="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all shadow-inner" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">סיסמה</label>
                                <input type="password" value={pass} onChange={(e) => setPass(e.target.value)} required 
                                       className="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-4 py-3.5 text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all shadow-inner" />
                            </div>

        // ==========================================
        // ADMIN DASHBOARD

        const AdminDashboard = ({ users, setUsers, records, setRecords, messages, setMessages, currentCycle, cyclesList, setCyclesList, showToast }) => {

                            {id: 'agents', name: 'סיכום סוכנים'},
                            {id: 'players', name: 'ניהול שחקנים ועמלות'},

                    <div className="card-gradient rounded-2xl p-4 sm:p-8 border border-slate-700/50 shadow-2xl">

                        {activeTab === 'import' && <AdminImportView setRecords={setRecords} setUsers={setUsers} users={users} currentCycle={currentCycle} setCyclesList={setCyclesList} cyclesList={cyclesList} records={records} showToast={showToast} />}
                        {activeTab === 'messages' && <AdminMessagesView users={users} messages={messages} setMessages={setMessages} showToast={showToast} />}
                        {activeTab === 'settings' && <AdminSettingsView users={users} setUsers={setUsers} records={records} setRecords={setRecords} currentCycle={currentCycle} cyclesList={cyclesList} setCyclesList={setCyclesList} showToast={showToast} />}
                    </div>
                </div>
            );
        };

        const AdminSettingsView = ({ users, setUsers, records, setRecords, currentCycle, cyclesList, setCyclesList, showToast }) => {
            const [modal, setModal] = useState({ isOpen: false, type: null }); // type: 'cycle' or 'all'

            const executeDelete = () => {
                if (modal.type === 'cycle') {
                    setRecords(records.filter(r => r.cycleId !== currentCycle));
                    const newCycles = cyclesList.filter(c => c !== currentCycle);
                    setCyclesList(newCycles.length > 0 ? newCycles : [DEFAULT_CYCLE]);
                    showToast('הנתונים של המחזור הנוכחי נמחקו בהצלחה', 'success');
                } else if (modal.type === 'all') {
                    setUsers(initialUsers); setRecords([]); setCyclesList([DEFAULT_CYCLE]); 
                    showToast('המערכת אופסה לחלוטין. נתוני בסיס נטענו.', 'success');
                }
                setModal({ isOpen: false, type: null });
            };

            return (
                <div className="space-y-6 max-w-2xl mx-auto md:mx-0">
                    <h3 className="text-xl font-bold text-white flex items-center gap-3"><Icon name="settings" size={24}/> הגדרות מערכת מתקדמות</h3>
                    
                    <div className="bg-red-900/10 p-6 rounded-xl border border-red-900/30">
                        <h4 className="text-red-400 font-bold mb-4 flex items-center gap-2">
                            <Icon name="trash" size={18} /> אזור סכנה (מחיקת נתונים)
                        </h4>
                        <div className="space-y-6">
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div>
                                    <div className="text-white font-medium text-lg">מחיקת המחזור הנוכחי</div>
                                    <div className="text-sm text-slate-400 mt-1">מוחק את כל רשומות המשחק והשולחנות ששויכו למחזור "{currentCycle}". השחקנים והסוכנים יישארו.</div>
                                </div>
                                <button onClick={() => setModal({isOpen: true, type: 'cycle'})} className="bg-red-900/40 text-red-400 border border-red-800 hover:bg-red-600 hover:text-white px-5 py-2.5 rounded-lg font-semibold transition-colors whitespace-nowrap">
                                    מחק מחזור זה
                                </button>
                            </div>
                            <div className="border-t border-red-900/30 pt-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <div>
                                    <div className="text-white font-medium text-lg">איפוס מערכת כללי (Factory Reset)</div>
                                    <div className="text-sm text-slate-400 mt-1">מוחק לחלוטין את כל השחקנים, כל הדוחות, וכל המחזורים. המערכת תחזור למצב ריק עם אדמין וסוכנים בסיסיים בלבד.</div>
                                </div>
                                <button onClick={() => setModal({isOpen: true, type: 'all'})} className="bg-red-600 text-white hover:bg-red-700 px-5 py-2.5 rounded-lg font-bold shadow-lg transition-colors whitespace-nowrap">
                                    איפוס כולל למערכת
                                </button>
                            </div>
                        </div>
                    </div>

                    <ConfirmModal 
                        isOpen={modal.isOpen} 
                        title={modal.type === 'all' ? "איפוס מערכת כולל!" : "מחיקת מחזור"} 
                        message={modal.type === 'all' ? "האם אתה בטוח לחלוטין שברצונך לאפס את המערכת? פעולה זו תמחק עשרות שחקנים ונתונים ואינה הפיכה לעולם." : `האם למחוק את כל הנתונים של "${currentCycle}"?`}
                        confirmText={modal.type === 'all' ? "כן, מחק הכל" : "מחק מחזור"}
                        onConfirm={executeDelete} 
                        onCancel={() => setModal({isOpen: false, type: null})} 
                    />
                </div>
            );
        };

        const AdminAgentsView = ({ users, records, currentCycle }) => {
            const [sortBy, setSortBy] = useState('pnl');
            const cycleRecords = records.filter(r => r.cycleId === currentCycle);
            const players = users.filter(u => u.role === 'player');
            const agents = users.filter(u => u.role === 'agent');

            const agentStats = useMemo(() => {
                return agents.map(agent => {
                    const agentPlayers = players.filter(p => p.agentId === agent.id).map(p => p.id);
                    const agentRecords = cycleRecords.filter(r => agentPlayers.includes(r.playerId));
                    
                    const pnl = agentRecords.reduce((sum, r) => sum + (r.pnl + (r.bonus||0)), 0);
                    const hands = agentRecords.reduce((sum, r) => sum + (r.hands || 0), 0);
                    let commission = 0;
                    
                    agentRecords.forEach(r => {
                        const player = players.find(p => p.id === r.playerId);
                        const rate = player?.customCommission !== null ? player.customCommission : agent.commissionRate;
                        commission += (r.rake * (1 - SYSTEM_EXPENSES_RATE)) * (rate / 100);
                    });

                    return { ...agent, pnl, hands, commission, playerCount: agentPlayers.length };
                }).sort((a, b) => {
                    if (sortBy === 'pnl') return a.pnl - b.pnl;
                    if (sortBy === 'commission') return b.commission - a.commission;
                    if (sortBy === 'hands') return b.hands - a.hands;
                    return 0;
                });
            }, [agents, players, cycleRecords, sortBy]);

            return (
                <div>
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">

                        <div className="flex items-center gap-3 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 shadow-inner">
                            <Icon name="sort" size={16} className="text-slate-400"/>
                            <select value={sortBy} onChange={(e) => setSortBy(e.target.value)} className="bg-transparent text-sm font-medium text-white outline-none cursor-pointer">
                                <option value="pnl">מיון לפי רווח/הפסד (P&L)</option>
                                <option value="commission">מיון לפי גובה עמלה</option>
                                <option value="hands">מיון לפי כמות ידיים</option>
                            </select>
                        </div>
                    </div>
                    <div className="overflow-x-auto rounded-xl border border-slate-700/50 shadow-xl">
                        <table className="w-full text-left text-sm whitespace-nowrap">
                            <thead className="bg-slate-800 text-slate-300 uppercase text-xs tracking-widest">
                                <tr>
                                    <th className="p-5 font-bold text-right border-b border-slate-700">סוכן</th>
                                    <th className="p-5 font-bold text-right border-b border-slate-700">שחקנים פעילים</th>
                                    <th className="p-5 font-bold text-right border-b border-slate-700">% בסיס</th>
                                    <th className="p-5 font-bold text-right border-b border-slate-700">ידיים (סה"כ)</th>
                                    <th className="p-5 font-bold text-right border-b border-slate-700">P&L שחקנים</th>
                                    <th className="p-5 font-bold text-right text-emerald-400 border-b border-slate-700">עמלת סוכן (נטו)</th>
                                    <th className="p-5 font-bold text-right text-cyan-400 border-b border-slate-700">התחשבנות סופית</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-700/50 bg-slate-900/30">

                                    <tr key={agent.id} className="hover:bg-slate-800/60 transition-colors">
                                        <td className="p-5 text-right">
                                            <div className="font-bold text-white text-base">{agent.name}</div>
                                            <div className="text-xs text-slate-500 mt-1">{agent.id === 'agent_default' ? 'מערכת' : `יוזר: ${agent.username}`}</div>
                                        </td>
                                        <td className="p-5 text-right font-medium text-slate-300">{agent.playerCount}</td>
                                        <td className="p-5 text-right font-medium text-slate-300">{agent.commissionRate}%</td>
                                        <td className="p-5 text-right font-medium text-slate-300">{agent.hands.toLocaleString()}</td>
                                        <td className={`p-5 text-right font-bold text-lg ${getColorClass(agent.pnl)}`}>{formatMoney(agent.pnl)}</td>
                                        <td className="p-5 text-right font-black text-lg text-emerald-400">{formatMoney(agent.commission)}</td>
                                        <td className={`p-5 text-right font-black text-lg ${getColorClass(agent.pnl + agent.commission)}`}>{formatMoney(agent.pnl + agent.commission)}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // --- Shared Drill-down Table (Used in Admin & Agent) ---
        const PlayerDetailsDrilldown = ({ player, record, finalPnl, showToast }) => {
            return (
                <div className="px-6 sm:px-10 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8 bg-slate-900/80 shadow-inner border-t-2 border-slate-700">
                    {/* Left Column: Details & Result */}
                    <div className="space-y-6">
                        <div className="bg-slate-800/80 p-5 rounded-xl border border-slate-700 shadow-md">
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <Icon name="eye" size={16} className="text-cyan-400"/> פרטי התחברות
                            </h4>
                            <div className="space-y-3 text-sm">
                                <div className="flex justify-between items-center bg-slate-900 px-3 py-2 rounded-lg">
                                    <span className="text-slate-500">משתמש:</span> 
                                    <span className="font-mono font-bold text-emerald-400">{player.username}</span>
                                </div>
                                <div className="flex justify-between items-center bg-slate-900 px-3 py-2 rounded-lg">
                                    <span className="text-slate-500">סיסמה:</span> 
                                    <span className="font-mono font-bold text-emerald-400">{player.password}</span>
                                </div>
                            </div>
                            <button onClick={() => { navigator.clipboard.writeText(`משתמש: ${player.username}\nסיסמה: ${player.password}`); showToast('פרטים הועתקו ללוח!'); }} 
                                    className="mt-4 w-full bg-slate-700 hover:bg-slate-600 text-white text-xs font-medium py-2 rounded-lg transition-colors">
                                העתק הודעה לשחקן
                            </button>
                        </div>

                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-xl border border-slate-700 shadow-md">
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">תוצאה סופית לשחקן (נטו)</h4>
                            <div className={`text-4xl font-black tracking-tight ${getColorClass(finalPnl)}`}>{formatMoney(finalPnl)}</div>
                            {record.bonus > 0 && (
                                <div className="mt-3 text-sm text-emerald-400 flex items-center gap-1.5 bg-emerald-900/30 inline-flex px-3 py-1 rounded-md font-medium border border-emerald-500/20">
                                    <Icon name="gift" size={14}/> כולל בונוס ע"ס {formatMoney(record.bonus)}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Right Column: Tables */}
                    <div className="bg-slate-800/50 p-6 rounded-xl border border-slate-700 shadow-md lg:col-span-2 flex flex-col">
                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <Icon name="dashboard" size={16} className="text-emerald-400"/> פירוט שולחנות ומשחקים
                        </h4>
                        {record.tables && record.tables.length > 0 ? (
                            <div className="overflow-x-auto flex-1">
                                <table className="w-full text-sm text-right text-slate-300">
                                    <thead className="bg-slate-900 text-slate-400 text-xs">
                                        <tr>
                                            <th className="p-3 font-semibold rounded-tr-lg">שם שולחן / טורניר</th>
                                            <th className="p-3 font-semibold text-center">ידיים</th>
                                            <th className="p-3 font-semibold rounded-tl-lg">תוצאה (P&L)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-700/50">
                                        {record.tables.map((t, idx) => (
                                            <tr key={idx} className="hover:bg-slate-800 transition-colors">
                                                <td className="p-3 font-medium text-slate-200">{t.name}</td>
                                                <td className="p-3 text-center">{t.hands}</td>
                                                <td className={`p-3 font-bold text-base ${getColorClass(t.pnl)}`}>{formatMoney(t.pnl)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot className="border-t-2 border-slate-600 bg-slate-900/50">
                                        <tr>
                                            <td className="p-3 font-bold text-slate-400">סה"כ משחקים:</td>
                                            <td className="p-3 font-bold text-white text-center">{record.hands}</td>
                                            <td className={`p-3 font-black text-lg ${getColorClass(record.pnl)}`}>{formatMoney(record.pnl)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        ) : (
                            <div className="flex-1 flex items-center justify-center text-slate-500 text-sm border-2 border-dashed border-slate-700 rounded-lg p-6 bg-slate-900/30">
                                אין פירוט שולחנות. ייתכן שהקובץ המיובא היה דוח סיכום כללי ולא דוח מפורט.
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const AdminPlayersView = ({ users, setUsers, records, setRecords, currentCycle, showToast }) => {
            const allPlayers = users.filter(u => u.role === 'player');
            const agents = users.filter(u => u.role === 'agent');
            const [bonusInput, setBonusInput] = useState({ playerId: null, amount: '' });
            const [searchQuery, setSearchQuery] = useState('');
            const [expandedRow, setExpandedRow] = useState(null);

            const players = useMemo(() => {
                if (!searchQuery) return allPlayers;
                return allPlayers.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.username.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [allPlayers, searchQuery]);

            const updatePlayer = (id, field, value) => {
                setUsers(users.map(u => u.id === id ? { ...u, [field]: value } : u));
                if(field === 'agentId') showToast('השחקן שויך לסוכן בהצלחה!');
                if(field === 'customCommission') showToast('עמלה חריגה עודכנה בהצלחה!');
            };

            const handleAddBonus = (playerId) => {
                if(!bonusInput.amount) return;
                const amt = parseFloat(bonusInput.amount);
                
                const existingRecIdx = records.findIndex(r => r.cycleId === currentCycle && r.playerId === playerId);
                if (existingRecIdx >= 0) {
                    const newRecords = [...records];
                    newRecords[existingRecIdx].bonus = (newRecords[existingRecIdx].bonus || 0) + amt;
                    setRecords(newRecords);
                } else {
                    setRecords([...records, { id: Date.now(), cycleId: currentCycle, playerId, pnl: 0, rake: 0, hands: 0, bonus: amt, tables: [] }]);
                }
                showToast(`בונוס ע"ס ${amt} נוסף בהצלחה לשחקן!`);
                setBonusInput({ playerId: null, amount: '' });
            };

            const toggleRow = (id) => setExpandedRow(expandedRow === id ? null : id);

            return (
                <div>
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6">
