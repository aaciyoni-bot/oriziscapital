<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>טיול קרוואנים 2026 - משפחות פרידמן</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .tab-active { border-bottom: 4px solid #4f46e5; color: #4f46e5; font-weight: bold; background-color: #f8fafc; }
        .tab-inactive { color: #6b7280; }
        .tab-inactive:hover { background-color: #f3f4f6; }
        .item-row { transition: all 0.2s ease; }
        .item-row:hover { background-color: #f9fafb; }
        .packed-text { text-decoration: line-through; color: #9ca3af; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .avatar-container { position: relative; display: inline-block; cursor: pointer; transition: transform 0.2s; }
        .avatar-container:hover { transform: scale(1.05); }
        .avatar-img { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; border: 3px solid #4f46e5; background-color: #e5e7eb; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .avatar-edit-btn { position: absolute; bottom: 0; right: 0; background-color: #4f46e5; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid white; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20 select-none">

    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white p-4 shadow-md sticky top-0 z-20">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-bold"><i class="fas fa-caravan mr-2"></i> קרוואנים 2026</h1>
            <div class="flex gap-2">
                <button onclick="exportToExcel()" class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full transition shadow" title="ייצוא לאקסל"><i class="fas fa-file-excel mr-1"></i> אקסל</button>
                <button id="editToggleBtn" onclick="toggleEditMode()" class="bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full text-sm font-semibold transition shadow">
                    <i class="fas fa-pen mr-1"></i> עריכה
                </button>
            </div>
        </div>
        <div class="flex justify-between items-center text-sm mb-1 mt-3">
            <span id="sync-status" class="text-blue-200"><i class="fas fa-sync fa-spin mr-1"></i> מתחבר לענן...</span>
            <span id="total-progress-text" class="font-bold">התקדמות כללית: 0%</span>
        </div>
        <div class="w-full bg-indigo-900 rounded-full h-2.5 shadow-inner">
            <div id="total-progress-bar" class="bg-green-400 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
    </header>

    <!-- Tabs Container -->
    <nav id="tabs-container" class="flex overflow-x-auto hide-scrollbar bg-white shadow-sm border-b z-10 sticky top-[100px] px-2 py-1">
        <!-- Tabs will be generated here -->
    </nav>

    <!-- Avatar Section -->
    <div class="flex justify-center mt-6 mb-2">
        <div class="avatar-container" onclick="document.getElementById('avatar-upload').click()">
            <img id="current-avatar" class="avatar-img" src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar">
            <div class="avatar-edit-btn"><i class="fas fa-camera"></i></div>
            <input type="file" id="avatar-upload" class="hidden" accept="image/*" onchange="handleAvatarUpload(event)">
        </div>
    </div>
    <div class="text-center mb-6">
        <h2 id="current-person-title" class="text-2xl font-bold text-gray-800"></h2>
    </div>

    <!-- Main Content Area -->
    <main id="app-content" class="p-4 max-w-3xl mx-auto">
        <div class="text-center mt-10">
            <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
            <p class="mt-4 text-gray-600 font-medium">טוען נתונים מהענן...</p>
        </div>
    </main>

    <!-- Custom Modal Overlay -->
    <div id="custom-modal" class="fixed inset-0 bg-black/60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 transform transition-all">
            <h3 id="modal-title" class="text-xl font-bold mb-3 text-gray-800"></h3>
            <p id="modal-message" class="text-gray-600 mb-6 text-lg"></p>
            <div class="flex justify-end gap-3">
                <button id="modal-cancel-btn" class="px-5 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg hidden font-medium transition">ביטול</button>
                <button id="modal-ok-btn" class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-bold shadow-md transition">אישור</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        //  הגדרות Firebase
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCYd3UQO4d1OQN23quXTwMj1WK2wq0chX4",
            authDomain: "tiyul-f886a.firebaseapp.com",
            projectId: "tiyul-f886a",
            storageBucket: "tiyul-f886a.firebasestorage.app",
            messagingSenderId: "644534839473",
            appId: "1:644534839473:web:f7632f361d24183e161a90",
            measurementId: "G-D54PY1YFPQ",
            databaseURL: "https://tiyul-f886a-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // רשימת כל המשתתפים והלשוניות
        const people = [
            "יוני", "חנה", "ליאור", "אייל", "הילה", "יובל", 
            "ציוד כללי פרידמן משמר", 
            "עוזיאל", "שרונה", "להבה", "אליה", "דביר", "הלל", 
            "ציוד כללי פרידמן אדורה", 
            "ציוד כללי משותף"
        ];
        
        let appData = { items: {}, avatars: {} };
        let currentTab = people[0];
        let isEditMode = false;

        const syncStatus = document.getElementById('sync-status');

        // האזנה לשינויים בענן
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                appData.items = data.items || {};
                appData.avatars = data.avatars || {};
            } else {
                appData = { items: {}, avatars: {} };
            }
            
            // בדיקה וייצור נתונים חסרים למשתתפים חדשים
            generateInitialData();

            syncStatus.innerHTML = '<i class="fas fa-cloud-check text-green-300 mr-1"></i> מסונכרן';
            // טעינה ישירה של האפליקציה (ללא מסך משתמש)
            renderApp();
        }, (error) => {
            syncStatus.innerHTML = '<i class="fas fa-exclamation-triangle text-red-300 mr-1"></i> שגיאת חיבור';
            showModal('שגיאה', 'לא ניתן להתחבר לענן. בדקו חיבור לאינטרנט.');
        });

        function showModal(title, message, showCancel = false, onOk = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            const modal = document.getElementById('custom-modal');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            const okBtn = document.getElementById('modal-ok-btn');
            
            cancelBtn.style.display = showCancel ? 'block' : 'none';
            
            const newOkBtn = okBtn.cloneNode(true);
            okBtn.parentNode.replaceChild(newOkBtn, okBtn);
            const newCancelBtn = cancelBtn.cloneNode(true);
            cancelBtn.parentNode.replaceChild(newCancelBtn, cancelBtn);

            newOkBtn.onclick = () => {
                modal.classList.add('hidden');
                if (onOk) onOk();
            };
            
            newCancelBtn.onclick = () => {
                modal.classList.add('hidden');
            };

            modal.classList.remove('hidden');
        }

        function renderApp() {
            renderTabs();
            renderContent();
            updateTotalProgress();
        }

        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';

            people.forEach(person => {
                const isActive = person === currentTab;
                const tabClass = isActive ? 'tab-active' : 'tab-inactive';
                
                let total = 0, packed = 0;
                if(appData.items[person]) {
                    Object.values(appData.items[person]).forEach(item => {
                        total++;
                        if(item.packed) packed++;
                    });
                }
                const progressText = total > 0 ? `${packed}/${total}` : '';
                const isDone = (packed === total && total > 0);
                const progressColor = isDone ? 'text-green-500 font-bold' : 'text-gray-500';

                const btn = document.createElement('button');
                btn.className = `px-5 py-3 whitespace-nowrap text-sm flex-shrink-0 transition-colors border-b-2 ${isActive ? 'border-indigo-600 text-indigo-700 font-bold bg-indigo-50/50' : 'border-transparent hover:border-gray-300'}`;
                btn.innerHTML = `
                    <div class="flex flex-col items-center gap-1">
                        <span class="text-base">${person}</span>
                        ${total > 0 ? `<span class="text-xs bg-gray-100 px-2 py-0.5 rounded-full ${progressColor}">${isDone ? '<i class="fas fa-check mr-1"></i>' : ''}${progressText}</span>` : ''}
                    </div>
                `;
                btn.onclick = () => {
                    currentTab = person;
                    renderApp(); // קריאה ישירה לרינדור
                };
                container.appendChild(btn);
            });
        }

        function handleAvatarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showModal('שגיאה', 'אנא בחרו קובץ תמונה חוקי.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 150;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        }
                    } else {
                        if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const base64String = canvas.toDataURL('image/jpeg', 0.7);

                    if (!appData.avatars) appData.avatars = {};
                    appData.avatars[currentTab] = base64String;
                    db.ref('avatars/' + currentTab).set(base64String).then(() => {
                        document.getElementById('current-avatar').src = base64String;
                    });
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function renderContent() {
            const content = document.getElementById('app-content');
            const personItems = appData.items[currentTab] || {};
            
            const avatarImg = document.getElementById('current-avatar');
            const titleElem = document.getElementById('current-person-title');
            
            if (appData.avatars && appData.avatars[currentTab]) {
                avatarImg.src = appData.avatars[currentTab];
            } else {
                avatarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentTab.split(' ')[0])}&background=random&color=fff&size=150`;
            }
            
            titleElem.innerText = `הרשימה של ${currentTab}`;

            const grouped = {};
            Object.keys(personItems).forEach(key => {
                const item = personItems[key];
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push({ id: key, ...item });
            });

            if (Object.keys(grouped).length === 0) {
                let html = `<div class="text-center p-8 bg-white rounded-2xl shadow-sm border border-gray-100"><p class="text-gray-500 mb-4 text-lg">הרשימה ריקה.</p>`;
                if(isEditMode) {
                     html += `
                     <div class="mt-4 p-5 bg-indigo-50 border border-indigo-100 rounded-xl">
                        <h4 class="font-bold mb-3 text-indigo-800">הוספת פריט ראשון</h4>
                        <input type="text" id="new-cat-empty" placeholder="קטגוריה (למשל: ביגוד)" class="w-full p-3 border border-indigo-200 rounded-lg mb-3 text-sm focus:ring-2 focus:ring-indigo-400">
                        <input type="text" id="new-name-empty" placeholder="שם הפריט" class="w-full p-3 border border-indigo-200 rounded-lg mb-3 text-sm focus:ring-2 focus:ring-indigo-400">
                        <input type="text" id="new-amount-empty" placeholder="כמות" class="w-full p-3 border border-indigo-200 rounded-lg mb-3 text-sm focus:ring-2 focus:ring-indigo-400">
                        <button onclick="addNewItemEmpty()" class="w-full bg-indigo-600 text-white p-3 rounded-lg text-base font-bold hover:bg-indigo-700 transition shadow">הוסף פריט</button>
                     </div>`;
                }
                html += `</div>`;
                content.innerHTML = html;
                return;
            }

            let html = '';
            for (const [category, items] of Object.entries(grouped)) {
                let catPacked = items.filter(i => i.packed).length;
                let catTotal = items.length;
                let isCatDone = catPacked === catTotal;

                html += `
                <div class="bg-white rounded-2xl shadow-sm mb-6 overflow-hidden border ${isCatDone ? 'border-green-200' : 'border-gray-200'}">
                    <div class="${isCatDone ? 'bg-green-50' : 'bg-gray-50'} px-5 py-4 border-b ${isCatDone ? 'border-green-100' : 'border-gray-200'} flex justify-between items-center transition-colors">
                        <h3 class="font-bold ${isCatDone ? 'text-green-800' : 'text-gray-800'} text-xl flex items-center">
                            ${isCatDone ? '<i class="fas fa-check-circle mr-2 text-green-500"></i>' : ''} ${category}
                        </h3>
                        <span class="text-sm font-semibold ${isCatDone ? 'bg-green-200 text-green-800' : 'bg-gray-200 text-gray-700'} px-3 py-1 rounded-full shadow-inner">${catPacked}/${catTotal}</span>
                    </div>
                    <ul class="divide-y divide-gray-100">
                `;

                items.forEach(item => {
                    const checked = item.packed ? 'checked' : '';
                    const textClass = item.packed ? 'packed-text' : 'text-gray-800';
                    const bgClass = item.packed ? 'bg-gray-50/50' : '';
                    
                    html += `
                    <li class="item-row p-4 flex justify-between items-center ${bgClass}">
                        <div class="flex items-center gap-4 flex-1 cursor-pointer" onclick="toggleItem('${currentTab}', '${item.id}')">
                            <div class="relative flex items-center justify-center w-8 h-8 rounded-lg border-2 ${item.packed ? 'border-green-500 bg-green-500' : 'border-gray-300 bg-white'} transition-colors flex-shrink-0">
                                ${item.packed ? '<i class="fas fa-check text-white text-sm"></i>' : ''}
                            </div>
                            <div>
                                <p class="font-bold ${textClass} text-lg">${item.name}</p>
                                <p class="text-sm text-gray-500 mt-1"><span class="font-semibold bg-gray-100 px-2 py-0.5 rounded text-gray-600 mr-1">כמות: ${item.amount}</span> ${item.note ? `<span class="text-gray-400">|</span> ${item.note}` : ''}</p>
                            </div>
                        </div>
                    `;

                    if (isEditMode) {
                        html += `
                        <div class="flex gap-2 mr-3">
                            <button onclick="editExistingItem('${currentTab}', '${item.id}', '${item.name.replace(/'/g, "\\'")}', '${item.amount}', '${(item.note||'').replace(/'/g, "\\'")}')" class="text-blue-500 bg-blue-50 p-2.5 rounded-xl hover:bg-blue-100 transition"><i class="fas fa-pen"></i></button>
                            <button onclick="deleteItem('${currentTab}', '${item.id}')" class="text-red-500 bg-red-50 p-2.5 rounded-xl hover:bg-red-100 transition"><i class="fas fa-trash"></i></button>
                        </div>`;
                    }
                    html += `</li>`;
                });

                if (isEditMode) {
                    html += `
                    <li class="p-4 bg-gray-50 border-t border-dashed border-gray-300">
                        <div class="flex flex-col gap-3">
                            <input type="text" id="new-name-${category}" placeholder="שם הפריט החדש" class="w-full p-3 border border-gray-300 rounded-lg text-base focus:ring-2 focus:ring-blue-400 shadow-sm">
                            <div class="flex flex-col sm:flex-row gap-2">
                                <input type="text" id="new-amount-${category}" placeholder="כמות" class="w-full sm:w-1/3 p-3 border border-gray-300 rounded-lg text-base shadow-sm">
                                <input type="text" id="new-note-${category}" placeholder="הערה (אופציונלי)" class="w-full sm:w-2/3 p-3 border border-gray-300 rounded-lg text-base shadow-sm">
                            </div>
                            <button onclick="addNewItem('${currentTab}', '${category}')" class="w-full bg-green-500 text-white px-5 py-3 rounded-lg font-bold shadow-md hover:bg-green-600 transition"><i class="fas fa-plus mr-1"></i> הוסף פריט</button>
                        </div>
                    </li>`;
                }

                html += `</ul></div>`;
            }
            content.innerHTML = html;
        }

        function toggleEditMode() {
            isEditMode = !isEditMode;
            const btn = document.getElementById('editToggleBtn');
            btn.innerHTML = isEditMode ? '<i class="fas fa-check mr-1"></i> סיום עריכה' : '<i class="fas fa-pen mr-1"></i> עריכה';
            btn.classList.toggle('bg-red-500', isEditMode);
            btn.classList.toggle('text-white', isEditMode);
            btn.classList.toggle('bg-white/20', !isEditMode);
            renderContent();
        }

        function toggleItem(person, itemId) {
            if(isEditMode) return;
            const currentState = appData.items[person][itemId].packed;
            db.ref(`items/${person}/${itemId}/packed`).set(!currentState);
        }

        function deleteItem(person, itemId) {
            showModal('מחיקת פריט', 'האם אתם בטוחים שברצונכם למחוק פריט זה מהרשימה?', true, () => {
                db.ref(`items/${person}/${itemId}`).remove();
            });
        }

        function addNewItem(person, category) {
            const nameInput = document.getElementById(`new-name-${category}`);
            const amountInput = document.getElementById(`new-amount-${category}`);
            const noteInput = document.getElementById(`new-note-${category}`);
            
            if(!nameInput.value.trim()) {
                showModal('חסר שם', 'יש להזין שם לפריט החדש.');
                return;
            }

            const newItem = {
                category: category,
                name: nameInput.value.trim(),
                amount: amountInput.value.trim() || "1",
                note: noteInput.value.trim(),
                packed: false
            };

            db.ref(`items/${person}`).push(newItem);
        }

        function addNewItemEmpty() {
            const cat = document.getElementById('new-cat-empty').value.trim() || 'כללי';
            const name = document.getElementById('new-name-empty').value.trim();
            const amount = document.getElementById('new-amount-empty').value.trim() || "1";
            
            if(!name) {
                showModal('שגיאה', 'חובה להזין שם פריט');
                return;
            }

            const newItem = { category: cat, name: name, amount: amount, note: "", packed: false };
            db.ref(`items/${currentTab}`).push(newItem);
        }

        function editExistingItem(person, itemId, oldName, oldAmount, oldNote) {
            const newName = prompt("ערוך שם פריט:", oldName);
            if (newName === null) return; 
            const newAmount = prompt("ערוך כמות:", oldAmount);
            if (newAmount === null) return;
            const newNote = prompt("ערוך הערה:", oldNote);
            if (newNote === null) return;

            db.ref(`items/${person}/${itemId}`).update({
                name: newName.trim() || oldName,
                amount: newAmount.trim() || oldAmount,
                note: newNote.trim()
            });
        }

        function updateTotalProgress() {
            let total = 0, packed = 0;
            
            Object.values(appData.items || {}).forEach(personItems => {
                Object.values(personItems).forEach(item => {
                    total++;
                    if(item.packed) packed++;
                });
            });

            const percent = total === 0 ? 0 : Math.round((packed / total) * 100);
            document.getElementById('total-progress-bar').style.width = `${percent}%`;
            document.getElementById('total-progress-text').innerText = `התקדמות כללית: ${percent}% (${packed}/${total} פריטים נארזו)`;
        }

            let list = [
                { category: "ביגוד יומיום", name: "חולצות קצרות", amount: "8", note: "מכונת כביסה בדרך" },
                { category: "ביגוד יומיום", name: "מכנסיים קצרים", amount: "5", note: "" },
                { category: "ביגוד יומיום", name: "מכנסיים ארוכים", amount: "3", note: "" },
                { category: "ביגוד יומיום", name: "לבנים / תחתונים", amount: "10", note: "" },
                { category: "ביגוד יומיום", name: "גרביים", amount: "8", note: "" },
                { category: "ביגוד יומיום", name: "פיג'מה / בגדי שינה", amount: "2", note: "" },
                
                { category: "ביגוד חם (לאוסטריה)", name: "מעיל פליז / סופטשל", amount: "1", note: "חובה לפסגות המושלגות" },
                { category: "ביגוד חם (לאוסטריה)", name: "חולצות ארוכות (בסיס)", amount: "2", note: "שיטת הבצל" },
                { category: "ביגוד חם (לאוסטריה)", name: "כובע גרב וכפפות", amount: "1", note: "חובה להרים!" },
                
                { category: "הנעלה", name: "נעלי הליכה סגורות / ספורט", amount: "1", note: "נוחות לטיולים" },
                { category: "הנעלה", name: "סנדלים נוחים", amount: "1", note: "" },
                { category: "הנעלה", name: "כפכפים", amount: "1", note: "למקלחות ולבריכה" },

        function exportToExcel() {
            if (!appData.items || Object.keys(appData.items).length === 0) {
                showModal('שגיאה', 'אין נתונים לייצוא');
                return;
            }

            let csvContent = "\uFEFF"; 
            csvContent += "עבור,קטגוריה,פריט,כמות,הערות,נארז?\n";

            people.forEach(person => {
                if(appData.items[person]) {
                    Object.values(appData.items[person]).forEach(item => {
                        const name = (item.name || "").replace(/"/g, '""');
                        const category = (item.category || "").replace(/"/g, '""');
                        const amount = (item.amount || "").replace(/"/g, '""');
                        const note = (item.note || "").replace(/"/g, '""');
                        const packed = item.packed ? "כן" : "לא";

                        csvContent += `"${person}","${category}","${name}","${amount}","${note}","${packed}"\n`;
                    });
                }
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "רשימת_אריזה_קרוואנים.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
